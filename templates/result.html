<!DOCTYPE html>
<html>
<head>
<title>Result</title>
<style>
body{
    font-family:sans-serif;
    text-align:center;
    background:#0f172a;
    color:white;
    padding:50px;
}

.card{
    background:white;
    color:black;
    padding:30px;
    border-radius:12px;
    max-width:500px;
    margin:auto;
}

.btn{
    display:inline-block;
    margin-top:15px;
    padding:12px 20px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="card">
    <h2>DXF Analysis Complete</h2>

    <p><b>Score:</b> {{score}}</p>
    <p><b>Status:</b> {{status}}</p>

    <p>Splines: {{issues.splines}}</p>
    <p>Blocks: {{issues.blocks}}</p>
    <p>Open Lines: {{issues.open}}</p>
    <p>Duplicates: {{issues.dup}}</p>

    <a class="btn" href="/download/{{file}}">Download Fixed DXF</a>
</div>

</body>
</html>
